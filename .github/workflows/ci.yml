# Canonical CI workflow for all portfolio repos.
#
# Design principle: CI is a thin wrapper that runs `just check` — same command
# as local dev. No rule duplication. If you add a quality gate to justfile,
# CI picks it up for free.
#
# Two-job structure:
#   - check       : full local quality gate (pre-commit hooks + ty + unit tests)
#                   runs on every push/PR, no secrets required
#   - integration : integration tests requiring live API keys
#                   gated behind secret availability (skips on fork PRs)
#                   depends on `check` passing first
#
# Repos WITHOUT integration tests: omit the `integration` job entirely.

name: CI — Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, type-check, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run full quality check (just check)
        env:
          # Skip the local-only `no-commit-to-branch` guard in CI.
          # That hook protects devs from committing to `main` directly;
          # in CI we ARE on `main` (post-merge push), and the hook would
          # otherwise fail every push-to-main run. Ruff, ty, and the stock
          # hygiene hooks still run.
          SKIP: no-commit-to-branch
        run: just check

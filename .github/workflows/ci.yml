name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      - name: Install package
        run: uv pip install -e .

      - name: Run tests
        run: uv run python -m pytest